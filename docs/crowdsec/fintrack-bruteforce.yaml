# CrowdSec scenario: FinTrack brute-force / credential-stuffing detection.
#
# Triggers when a single source IP produces 5+ login failures in 5 minutes.
# The action is `ban`, which feeds the bouncers your homelab has attached
# (Traefik, nginx, iptables, etc.).

type: leaky
name: fintrack/bruteforce-login
description: "Detect credential brute-force against the FinTrack login endpoint"
filter: "evt.Meta.service == 'fintrack' && (evt.Parsed.action == 'LOGIN' || evt.Parsed.action == 'TOTP_VERIFY') && evt.Parsed.status == 'FAILURE'"
groupby: "evt.Meta.source_ip"
capacity: 5
leakspeed: 60s
blackhole: 2m
labels:
  service: fintrack
  type: bruteforce
  remediation: true
