# ============================================================
# FinTrack Pro -- Docker Compose
# All services restart automatically on system reboot
# ============================================================

networks:
  fintrack-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  nginx-certs:
  nginx-html:
  certbot-www:
  app-logs:
  prometheus-data:
  grafana-data:

services:

  # ----------------------------------------------------------
  # Nginx -- Reverse proxy, SSL termination, rate limiting
  # Fallback ingress. Default deployment expects an external
  # Traefik instance (homelab pattern) to route to frontend +
  # backend via the Traefik labels declared below. If you are
  # not running Traefik, activate the bundled Nginx with:
  #   docker compose --profile nginx up -d
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: fintrack-nginx
    restart: always
    profiles: ["nginx"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/letsencrypt
      - nginx-html:/var/www/html
      - certbot-www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Certbot -- Let's Encrypt certificate issuance & renewal
  # Runs on-demand (docker compose run --rm certbot ...)
  # and as a loop that renews every 12h when started with `up`
  # ----------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: fintrack-certbot
    restart: unless-stopped
    profiles: ["nginx"]
    volumes:
      - nginx-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet && sleep 12h & wait $${!}; done;'"
    networks:
      - fintrack-net

  # ----------------------------------------------------------
  # Frontend -- React + Vite (served as static files)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost/ws}
        - VITE_APP_NAME=${VITE_APP_NAME:-FinTrack Pro}
    container_name: fintrack-ui
    restart: always
    labels:
      traefik.enable: "${TRAEFIK_ENABLED:-true}"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik-proxy}"
      traefik.http.routers.fintrack-ui.rule: "Host(`${TRAEFIK_HOST:-fatihaciroglu.dev}`)"
      traefik.http.routers.fintrack-ui.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.fintrack-ui.tls: "true"
      traefik.http.routers.fintrack-ui.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.services.fintrack-ui.loadbalancer.server.port: "3000"
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Backend -- Spring Boot API
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrack-api
    restart: always
    labels:
      com.fintrack.log: "true"
      com.fintrack.service: backend
      traefik.enable: "${TRAEFIK_ENABLED:-true}"
      traefik.docker.network: "${TRAEFIK_NETWORK:-traefik-proxy}"
      traefik.http.routers.fintrack-api.rule: "Host(`${TRAEFIK_HOST:-fatihaciroglu.dev}`) && (PathPrefix(`/api/`) || PathPrefix(`/ws/`))"
      traefik.http.routers.fintrack-api.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.fintrack-api.tls: "true"
      traefik.http.routers.fintrack-api.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.routers.fintrack-api.priority: "100"
      traefik.http.services.fintrack-api.loadbalancer.server.port: "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${APP_ENV:-production}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-fintrack}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-fintrack}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY_MINUTES=${JWT_ACCESS_EXPIRY_MINUTES:-15}
      - JWT_REFRESH_EXPIRY_DAYS=${JWT_REFRESH_EXPIRY_DAYS:-30}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
      - EXCHANGE_RATE_API_KEY=${EXCHANGE_RATE_API_KEY:-}
      - PRICE_SYNC_INTERVAL_MINUTES=${PRICE_SYNC_INTERVAL_MINUTES:-5}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_ENABLED=${CLAUDE_ENABLED:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - LOG_DIR=/var/log/fintrack
      - LOG_MAX_FILE_SIZE=${LOG_MAX_FILE_SIZE:-50MB}
      - LOG_MAX_HISTORY_DAYS=${LOG_MAX_HISTORY_DAYS:-90}
      - LOG_TOTAL_SIZE_CAP=${LOG_TOTAL_SIZE_CAP:-1GB}
      - LOG_ERROR_TOTAL_SIZE_CAP=${LOG_ERROR_TOTAL_SIZE_CAP:-256MB}
      - AUTHELIA_ENABLED=${AUTHELIA_ENABLED:-false}
      - AUTHELIA_HEADER=${AUTHELIA_HEADER:-Remote-User}
      - AUTHELIA_TRUSTED_IPS=${AUTHELIA_TRUSTED_IPS:-}
    volumes:
      - app-logs:/var/log/fintrack
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # Backup -- daily pg_dump loop, host-agnostic (no systemd/Task
  # Scheduler needed). Dumps go to ./backups on the host, 30-day
  # retention. Runs the first dump ~5 min after boot, then every
  # 24h while the stack is up.
  # ----------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: fintrack-backup
    restart: always
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-fintrack}
      - POSTGRES_DB=${POSTGRES_DB:-fintrack}
      - PGPASSWORD=${POSTGRES_PASSWORD}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fintrack-net
    entrypoint: >
      /bin/sh -c '
        sleep 300;
        while :; do
          TS=$$(date +%Y%m%d_%H%M%S);
          FILE=/backups/fintrack_$$TS.sql.gz;
          echo "[backup] dumping to $$FILE";
          pg_dump -h "$$POSTGRES_HOST" -U "$$POSTGRES_USER" "$$POSTGRES_DB" | gzip > "$$FILE"
            && echo "[backup] ok $$FILE"
            || echo "[backup] FAILED $$FILE";
          find /backups -name "fintrack_*.sql.gz" -mtime +$$BACKUP_RETENTION_DAYS -delete 2>/dev/null || true;
          sleep "$$BACKUP_INTERVAL_SECONDS";
        done
      '

  # ----------------------------------------------------------
  # PostgreSQL -- Primary database
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: fintrack-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-fintrack}
      - POSTGRES_USER=${POSTGRES_USER:-fintrack}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintrack} -d ${POSTGRES_DB:-fintrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Prometheus -- metrics scraping
  # Scrapes backend /api/actuator/prometheus every 30s.
  # Only reachable inside fintrack-net (no published ports);
  # Grafana reads from it.
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: fintrack-prometheus
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Promtail -- ships backend logs to an external Loki. Disabled
  # by default; enable with `docker compose --profile loki up -d`
  # after setting LOKI_URL in .env to your Loki push endpoint.
  # Auto-discovers containers via the Docker socket (read-only)
  # and scrapes only those labelled `com.fintrack.log=true`.
  # ----------------------------------------------------------
  promtail:
    image: grafana/promtail:3.2.0
    container_name: fintrack-promtail
    restart: unless-stopped
    profiles: ["loki"]
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    environment:
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - fintrack-net

  # ----------------------------------------------------------
  # Grafana -- dashboards
  # Published on host port 3001 so the owner can reach it
  # locally (e.g. http://localhost:3001). Default login is
  # admin / GRAFANA_ADMIN_PASSWORD from .env.
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: fintrack-grafana
    restart: always
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # Redis -- Session cache, price cache, rate limiting
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fintrack-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - fintrack-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
