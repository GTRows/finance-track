global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: fintrack

scrape_configs:
  - job_name: fintrack-backend
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets:
          - backend:8080
        labels:
          service: backend

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
