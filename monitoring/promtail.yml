# Promtail config -- ships FinTrack container logs to an external Loki.
# Discovery uses the Docker socket (mounted read-only); only containers with
# the label `com.fintrack.log=true` are scraped so we do not dump every
# neighbouring container into Loki.
#
# The Loki URL is passed in via the LOKI_URL environment variable at compose
# time (falls back to http://loki:3100 so a same-network Loki still works).

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${LOKI_URL:-http://loki:3100}/loki/api/v1/push

scrape_configs:
  - job_name: fintrack-docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: label
            values: ["com.fintrack.log=true"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_fintrack_service]
        target_label: service
      - target_label: app
        replacement: fintrack
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            msg: msg
            userId: userId
            requestId: requestId
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
