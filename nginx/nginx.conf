worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server_tokens off;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- Default HTTP server: serves localhost and any unknown host. ---
    # The ACME HTTP-01 challenge is also served from here so certbot can
    # provision certificates before the HTTPS server block is enabled.
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        limit_conn conn_limit 20;
        client_max_body_size 10m;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        include /etc/nginx/snippets/security-headers.conf;
        include /etc/nginx/snippets/locations.conf;
    }

    # --- Production TLS + forced-HTTPS servers.
    # Enabled only after the Let's Encrypt certificate is present. The file
    # below does not exist by default; ssl-setup.sh copies tls.conf.template
    # into conf.d/tls.conf and reloads nginx once the cert is issued. ---
    include /etc/nginx/conf.d/*.conf;
}
