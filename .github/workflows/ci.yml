name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Verify (compile, test, package)
        run: ./mvnw -B -ntp -Dstyle.color=always verify

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Backend test results"
            if [ -d target/surefire-reports ]; then
              total=$(grep -hoE 'tests="[0-9]+"' target/surefire-reports/TEST-*.xml 2>/dev/null | awk -F'"' '{s+=$2} END {print s+0}')
              failed=$(grep -hoE 'failures="[0-9]+"' target/surefire-reports/TEST-*.xml 2>/dev/null | awk -F'"' '{s+=$2} END {print s+0}')
              errors=$(grep -hoE 'errors="[0-9]+"' target/surefire-reports/TEST-*.xml 2>/dev/null | awk -F'"' '{s+=$2} END {print s+0}')
              skipped=$(grep -hoE 'skipped="[0-9]+"' target/surefire-reports/TEST-*.xml 2>/dev/null | awk -F'"' '{s+=$2} END {print s+0}')
              echo "| Total | Failed | Errors | Skipped |"
              echo "|-------|--------|--------|---------|"
              echo "| ${total} | ${failed} | ${errors} | ${skipped} |"
            fi
            if [ -f target/site/jacoco/jacoco.csv ]; then
              coverage=$(awk -F',' 'NR>1 { inst += $4 + $5; miss += $4 } END { if (inst > 0) printf "%.1f", (inst - miss) * 100.0 / inst }' target/site/jacoco/jacoco.csv)
              echo ""
              echo "Instruction coverage: **${coverage}%**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Jacoco coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-coverage
          path: backend/target/site/jacoco
          retention-days: 7
          if-no-files-found: ignore

  frontend:
    name: Frontend type-check & build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Write build size summary
        if: always()
        run: |
          {
            echo "## Frontend build output"
            if [ -d dist ]; then
              total=$(du -sb dist | awk '{print $1}')
              echo "Total size: **$(numfmt --to=iec ${total})**"
              echo ""
              echo "\`\`\`"
              find dist -type f \( -name "*.js" -o -name "*.css" \) -printf "%s\t%p\n" | sort -rn | head -10 | awk '{printf "%10s  %s\n", $1, $2}'
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  docker:
    name: Docker build & scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: fintrack-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: fintrack-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: fintrack-backend:ci
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Trivy frontend image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: fintrack-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload backend image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  ci-complete:
    name: CI complete
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: always()
    timeout-minutes: 2
    steps:
      - name: Verify all upstream jobs succeeded
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] \
            || [ "${{ needs.frontend.result }}" != "success" ] \
            || [ "${{ needs.docker.result }}" != "success" ]; then
            echo "Upstream job failed:"
            echo "  backend=${{ needs.backend.result }}"
            echo "  frontend=${{ needs.frontend.result }}"
            echo "  docker=${{ needs.docker.result }}"
            exit 1
          fi
