# Requires:
#   1. Repository setting "Allow auto-merge" enabled (Settings -> General).
#   2. Branch protection on main with required status checks (backend, frontend, docker)
#      so --auto waits for CI before merging. Without required checks, auto-merge
#      fires immediately on PR creation.
name: Dependabot auto-merge

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Flag major updates for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr comment "$PR_URL" --body "Major version bump detected (${{ steps.meta.outputs.dependency-names }} ${{ steps.meta.outputs.previous-version }} -> ${{ steps.meta.outputs.new-version }}). Auto-merge skipped -- review breaking changes before merging."
